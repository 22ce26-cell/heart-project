<!DOCTYPE html>

<html>
<head>
    <title>Heart Disease Predictor</title>

```
<style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        width: 420px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin: 6px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        margin-top: 10px;
        cursor: pointer;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        text-align: center;
        margin-top: 15px;
    }
</style>
```

</head>

<body>

<div class="container">
    <h2>❤️ Heart Disease Prediction</h2>

```
<form action="/predict" method="post">

    <input type="number" name="age" placeholder="Age" required>

    <select name="sex">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select>

    <select name="cp">
        <option value="0">No Pain</option>
        <option value="1">Mild</option>
        <option value="2">Moderate</option>
        <option value="3">Severe</option>
    </select>

    <input type="number" name="trestbps" placeholder="Blood Pressure">
    <input type="number" name="chol" placeholder="Cholesterol">

    <select name="fbs">
        <option value="0">Normal Sugar</option>
        <option value="1">High Sugar</option>
    </select>

    <select name="restecg">
        <option value="0">Normal ECG</option>
        <option value="1">Abnormal</option>
        <option value="2">Severe</option>
    </select>

    <input type="number" name="thalach" placeholder="Max Heart Rate">

    <select name="exang">
        <option value="0">No Angina</option>
        <option value="1">Angina</option>
    </select>

    <input type="number" step="0.1" name="oldpeak" placeholder="Oldpeak">

    <select name="slope">
        <option value="0">Upsloping</option>
        <option value="1">Flat</option>
        <option value="2">Downsloping</option>
    </select>

    <input type="number" name="ca" placeholder="Vessels (0-3)">

    <select name="thal">
        <option value="0">Normal</option>
        <option value="1">Fixed Defect</option>
        <option value="2">Reversible</option>
        <option value="3">Severe</option>
    </select>

    <button type="submit">Predict</button>
</form>

<div class="result" style="color: {{ result_color }};">
    <h3>{{ prediction_text }}</h3>
    <p>Risk Probability: {{ probability }}%</p>

    <div style="background:#ddd; border-radius:10px; overflow:hidden;">
        <div style="
            width: {{ probability }}%;
            background: {{ result_color }};
            color:white;
            padding:5px;
        ">
            {{ probability }}%
        </div>
    </div>

    <p style="font-size:12px; color:gray;">
    *This is a machine learning prediction, not a medical diagnosis.
    </p>
</div>
```

</div>

</body>
</html>
